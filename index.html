<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Countdown</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #191a1d, #0a0a0c);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        color: white;
    }

    /* Background animated blobs */
    .blob {
        position: absolute;
        width: 550px;
        height: 550px;
        border-radius: 50%;
        background: #6a5af940;
        filter: blur(150px);
        animation: float 16s ease-in-out infinite alternate;
    }
    .blob:nth-child(1) { top: -150px; left: -120px; }
    .blob:nth-child(2) { bottom: -130px; right: -90px; animation-duration: 22s; }

    @keyframes float {
        from { transform: translateY(0); }
        to   { transform: translateY(50px); }
    }

    /* Countdown free-floating container */
    .count {
        display: flex;
        gap: 60px;
        font-size: 7rem;     /* ✅ Big numbers */
        font-weight: 700;
        z-index: 2;
    }

    .group {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        height: 180px;     /* ✅ Enough space for vertical animation */
        overflow: hidden;
    }

    .label {
        margin-top: 20px;
        font-size: 1.2rem;
        opacity: 0.65;
        letter-spacing: 2px;
    }

    /* Floating number spans */
    .digit span {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 1;
        transition: transform 0.5s ease, opacity 0.5s ease;
    }

    /* OUTGOING number */
    .out {
        opacity: 0;
        transform: translate(-50%, 70%); /* slide downward */
    }

    /* INCOMING number (starts above) */
    .in {
        opacity: 0;
        transform: translate(-50%, -170%);
    }

    /* INCOMING ACTIVE (final position) */
    .in-active {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
</style>
</head>
<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="count">
    <div class="group">
        <div class="digit" id="days"></div>
        <div class="label">DAYS</div>
    </div>

    <div class="group">
        <div class="digit" id="hours"></div>
        <div class="label">HOURS</div>
    </div>

    <div class="group">
        <div class="digit" id="mins"></div>
        <div class="label">MINS</div>
    </div>

    <div class="group">
        <div class="digit" id="secs"></div>
        <div class="label">SECS</div>
    </div>
</div>

<script>
    const examDate = new Date("2026-05-08T09:00:00");

    function animateDigit(container, newValue) {
        const oldSpan = container.querySelector("span");

        const newSpan = document.createElement("span");
        newSpan.textContent = newValue;
        newSpan.classList.add("in");
        container.appendChild(newSpan);

        requestAnimationFrame(() => {
            if (oldSpan) oldSpan.classList.add("out");

            newSpan.classList.remove("in");
            newSpan.classList.add("in-active");
        });

        setTimeout(() => { if (oldSpan) oldSpan.remove(); }, 500);
    }

    function update() {
        const now = new Date();
        const diff = examDate - now;

        if (diff <= 0) return;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);

        animateDigit(document.getElementById("days"), d);
        animateDigit(document.getElementById("hours"), h);
        animateDigit(document.getElementById("mins"), m);
        animateDigit(document.getElementById("secs"), s);
    }

    update();
    setInterval(update, 1000);
</script>

</body>
</html>
``
