<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Countdown</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #0e0e10, #1b1f23);
            color: #fff;
            font-family: "Segoe UI", Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* Subtle blurred bubbles in background */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: #4f91ff33;
            filter: blur(120px);
            border-radius: 50%;
            animation: float 12s ease-in-out infinite alternate;
        }
        .blob:nth-child(1) { top: -100px; left: -100px; }
        .blob:nth-child(2) { bottom: -120px; right: -80px; animation-duration: 16s; }

        @keyframes float {
            from { transform: translateY(0px); }
            to { transform: translateY(40px); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 60px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            z-index: 2;
        }

        h1 {
            font-size: 2.4rem;
            margin: 0 0 20px;
            font-weight: 600;
        }

        #countdown {
            font-size: 2rem;
            letter-spacing: 1px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="blob"></div>

    <div class="glass-card">
        <h1>Countdown to First GCSE Exam</h1>
        <div id="countdown">Loading…</div>
    </div>

    <script>
        function updateCountdown() {
            const examDate = new Date("2026-05-08T09:00:00");
            const now = new Date();
            const diff = examDate - now;

            if (diff <= 0) {
                document.getElementById("countdown").innerHTML = "It's exam day! Good luck!";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById("countdown").innerHTML =
                `${days}d ${hours}h ${mins}m ${secs}s`;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
