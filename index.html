<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Howard School - First GCSE Countdown</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #191a1d, #0a0a0c);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        color: white;
    }

    /* Background blobs */
    .blob {
        position: absolute;
        width: 550px;
        height: 550px;
        border-radius: 50%;
        background: #6a5af93a;
        filter: blur(160px);
        animation: float 16s ease-in-out infinite alternate;
    }
    .blob:nth-child(1) { top: -150px; left: -120px; }
    .blob:nth-child(2) { bottom: -150px; right: -120px; animation-duration: 22s; }

    @keyframes float {
        from { transform: translateY(0); }
        to   { transform: translateY(40px); }
    }

    /* Countdown layout */
    .count {
        display: flex;
        gap: 80px;
        z-index: 5;
    }

    .group {
        position: relative;
        width: 200px;
        height: 220px;
        text-align: center;
    }

    .label {
        margin-top: 10px;
        font-size: 1.3rem;
        opacity: 0.7;
        letter-spacing: 2px;
    }

    .digit {
        position: relative;
        width: 100%;
        height: 180px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .digit span {
        font-size: 7rem;
        font-weight: 700;
    }
</style>
</head>
<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="count">
    <div class="group">
        <div class="digit" id="days"></div>
        <div class="label">DAYS</div>
    </div>
    <div class="group">
        <div class="digit" id="hours"></div>
        <div class="label">HOURS</div>
    </div>
    <div class="group">
        <div class="digit" id="mins"></div>
        <div class="label">MINS</div>
    </div>
    <div class="group">
        <div class="digit" id="secs"></div>
        <div class="label">SECS</div>
    </div>
</div>

<script>
const examDate = new Date("2026-05-08T09:00:00");

// Helper to pad numbers (02, 07, 09, etc.)
function pad(num) {
    return num.toString().padStart(2, "0");
}

function update() {
    const now = new Date();
    const diff = examDate - now;

    if (diff <= 0) return;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("days").innerHTML = `<span>${pad(d)}</span>`;
    document.getElementById("hours").innerHTML = `<span>${pad(h)}</span>`;
    document.getElementById("mins").innerHTML = `<span>${pad(m)}</span>`;
    document.getElementById("secs").innerHTML = `<span>${pad(s)}</span>`;
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
