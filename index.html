<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Countdown</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #1a1a1d, #0c0c0e);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        color: white;
    }

    /* Blurred background blobs */
    .blob {
        position: absolute;
        width: 450px;
        height: 450px;
        border-radius: 50%;
        background: #6a5af940;
        filter: blur(140px);
        animation: float 12s ease-in-out infinite alternate;
    }
    .blob:nth-child(1) { top: -120px; left: -100px; }
    .blob:nth-child(2) { bottom: -110px; right: -80px; animation-duration: 18s; }

    @keyframes float {
        from { transform: translateY(0); }
        to   { transform: translateY(40px); }
    }

    /* Container for glass numbers */
    .count {
        display: flex;
        gap: 30px;
        font-size: 4rem;
        font-weight: 600;
        position: relative;
        z-index: 2;
    }

    .group {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .label {
        margin-top: 15px;
        font-size: 1rem;
        opacity: 0.65;
    }

    /* Glass digit container */
    .digit {
        width: 120px;
        height: 90px;
        padding: 0;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Each number span */
    .digit span {
        position: absolute;
        font-size: 3.5rem;
        font-weight: 700;
        opacity: 1;
        transform: translateY(0);
        transition: transform 0.45s ease, opacity 0.45s ease;
    }

    /* Outgoing number */
    .out {
        opacity: 0;
        transform: translateY(40px);
    }

    /* New incoming number (starts above) */
    .in {
        opacity: 0;
        transform: translateY(-40px);
    }

    /* Incoming number final state */
    .in-active {
        opacity: 1;
        transform: translateY(0);
    }
</style>
</head>
<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="count">
    <div class="group"><div class="digit" id="days"></div><div class="label">DAYS</div></div>
    <div class="group"><div class="digit" id="hours"></div><div class="label">HOURS</div></div>
    <div class="group"><div class="digit" id="mins"></div><div class="label">MINS</div></div>
    <div class="group"><div class="digit" id="secs"></div><div class="label">SECS</div></div>
</div>

<script>
    const examDate = new Date("2026-05-08T09:00:00");

    function animateDigit(element, newValue) {
        const oldSpan = element.querySelector("span");

        // CREATE the new number
        const newSpan = document.createElement("span");
        newSpan.textContent = newValue;
        newSpan.classList.add("in");
        element.appendChild(newSpan);

        // Let the browser register the element before animating
        requestAnimationFrame(() => {
            if (oldSpan) oldSpan.classList.add("out");

            newSpan.classList.remove("in");
            newSpan.classList.add("in-active");
        });

        // Remove the old number AFTER transition finishes
        setTimeout(() => {
            if (oldSpan) oldSpan.remove();
        }, 450);
    }

    function update() {
        const now = new Date();
        const diff = examDate - now;

        if (diff <= 0) return;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);

        animateDigit(document.getElementById("days"), d);
        animateDigit(document.getElementById("hours"), h);
        animateDigit(document.getElementById("mins"), m);
        animateDigit(document.getElementById("secs"), s);
    }

    update();                 // initial numbers
    setInterval(update, 1000); // update every second
</script>

</body>
</html>
