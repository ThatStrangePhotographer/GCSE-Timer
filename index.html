<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Countdown</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #191a1d, #0a0a0c);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        color: white;
    }

    /* Background blobs */
    .blob {
        position: absolute;
        width: 550px;
        height: 550px;
        border-radius: 50%;
        background: #6a5af93a;
        filter: blur(160px);
        animation: float 16s ease-in-out infinite alternate;
    }
    .blob:nth-child(1) { top: -150px; left: -120px; }
    .blob:nth-child(2) { bottom: -150px; right: -120px; animation-duration: 22s; }

    @keyframes float {
        from { transform: translateY(0); }
        to   { transform: translateY(40px); }
    }

    /* Countdown layout */
    .count {
        display: flex;
        gap: 80px;
        z-index: 5;
    }

    .group {
        position: relative;
        width: 200px;   /* plenty of space for large digits */
        height: 220px;  /* tall enough for vertical animation */
        overflow: hidden;
        text-align: center;
    }

    /* LABELS */
    .label {
        margin-top: 10px;
        font-size: 1.3rem;
        opacity: 0.7;
        letter-spacing: 2px;
    }

    /* DIGITS */
    .digit {
        position: relative;
        width: 100%;
        height: 180px;
    }

    /* Each digit span */
    .digit span {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 7rem;    /* ✅ Large */
        font-weight: 700;
        opacity: 1;
        transition: transform 0.5s ease, opacity 0.5s ease;
    }

    /* Outgoing digit */
    .out {
        opacity: 0;
        transform: translate(-50%, 120%);
    }

    /* Incoming digit starts above */
    .in {
        opacity: 0;
        transform: translate(-50%, -120%);
    }

    /* Incoming digit final resting state */
    .in-active {
        opacity: 1;
        transform: translate(-50%, 0%);
    }
</style>
</head>
<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="count">
    <div class="group">
        <div class="digit" id="days"></div>
        <div class="label">DAYS</div>
    </div>
    <div class="group">
        <div class="digit" id="hours"></div>
        <div class="label">HOURS</div>
    </div>
    <div class="group">
        <div class="digit" id="mins"></div>
        <div class="label">MINS</div>
    </div>
    <div class="group">
        <div class="digit" id="secs"></div>
        <div class="label">SECS</div>
    </div>
</div>

<script>
const examDate = new Date("2026-05-08T09:00:00");

const lastValues = {
    days: null,
    hours: null,
    mins: null,
    secs: null
};

function animateDigit(container, newValue, key) {
    // ✅ Only animate if value changed
    if (lastValues[key] === newValue) return;
    lastValues[key] = newValue;

    const oldSpan = container.querySelector("span");

    const newSpan = document.createElement("span");
    newSpan.textContent = newValue;
    newSpan.classList.add("in");
    container.appendChild(newSpan);

    requestAnimationFrame(() => {
        if (oldSpan) oldSpan.classList.add("out");

        newSpan.classList.remove("in");
        newSpan.classList.add("in-active");
    });

    setTimeout(() => {
        if (oldSpan) oldSpan.remove();
    }, 500);
}

function update() {
    const now = new Date();
    const diff = examDate - now;

    if (diff <= 0) return;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    animateDigit(document.getElementById("days"), d, "days");
    animateDigit(document.getElementById("hours"), h, "hours");
    animateDigit(document.getElementById("mins"), m, "mins");
    animateDigit(document.getElementById("secs"), s, "secs");
}

function init() {
    update(); // create initial numbers
    setInterval(update, 1000);
}

init();
</script>

</body>
</html>
