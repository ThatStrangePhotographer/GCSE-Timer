<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GCSE Exam Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f5f5f5;
        color: #222;
    }

    header {
        background: #4a6cf7;
        padding: 20px;
        color: white;
        text-align: center;
    }

    #nextExam {
        background: white;
        margin: 20px auto;
        max-width: 750px;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    #examList {
        max-width: 800px;
        margin: auto;
        padding-bottom: 50px;
    }

    .exam-card {
        background: white;
        margin: 12px 0;
        padding: 18px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.2s;
        border: 2px solid transparent;
    }

    .exam-card.yellow { border-color: #ffe066; }
    .exam-card.orange { border-color: #ff9f43; }
    .exam-card.red { border-color: #ff6b6b; }
    .exam-card.finished {
        opacity: 0.55;
        background: #e0e0e0;
    }

    .fav {
        cursor: pointer;
        font-size: 22px;
        user-select: none;
    }

    .search-container {
        max-width: 800px;
        margin: auto;
        display: flex;
        gap: 10px;
    }

    #searchBar {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 16px;
        margin: 20px auto;
    }

    .filter-buttons {
        max-width: 800px;
        margin: 0 auto 20px auto;
        text-align: center;
    }

    button {
        padding: 10px 18px;
        font-size: 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin: 5px;
    }

    .active-filter {
        background: #4a6cf7;
        color: white;
    }

    .inactive-filter {
        background: #ddd;
    }

</style>
</head>
<body>

<header>
    <h1>GCSE Exam Countdown</h1>
</header>

<section id="nextExam">
    <h2>Next GCSE Exam</h2>
    <div id="nextExamContent">Loading…</div>
</section>

<div class="search-container">
    <input type="text" id="searchBar" placeholder="Search exams...">
</div>

<div class="filter-buttons">
    <button id="filterAll" class="active-filter">All Exams</button>
    <button id="filterFav" class="inactive-filter">⭐ Favourites Only</button>
</div>

<section id="examList"></section>

<script>
/* --------------------------
   EXAM DATA (EDIT THIS PART)
--------------------------- */
const examData = [
    { name: "Mathematics Paper 1", date: "2026-05-10T09:00:00" },
    { name: "English Literature", date: "2026-05-12T13:30:00" },
    { name: "Biology Paper 1", date: "2026-05-03T09:00:00" },
    { name: "Chemistry Paper 1", date: "2026-05-05T09:00:00" }
];

/* --------------------------
   GLOBALS
--------------------------- */
let favourites = JSON.parse(localStorage.getItem("favourites")) || [];
let showFavouritesOnly = false;
let searchQuery = "";

/* --------------------------
   HELPER FUNCTIONS
--------------------------- */
function isStarted(examDate) {
    const now = Date.now();
    const start = new Date(examDate).getTime();
    return now >= start && now < start + 3600000;
}

function isFinished(examDate) {
    const now = Date.now();
    const end = new Date(examDate).getTime() + 3600000;
    return now >= end;
}

function getTimeRemaining(examDate) {
    const now = Date.now();
    const start = new Date(examDate).getTime();
    let diff = start - now;
    if (diff < 0) diff = 0;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    return { h, m, s, total: diff };
}

function formatCountdown(examDate) {
    if (isFinished(examDate)) return "Finished ✅";
    if (isStarted(examDate)) return "Started";

    const t = getTimeRemaining(examDate);
    return `${t.h}h ${t.m}m ${t.s}s`;
}

function urgencyClass(examDate) {
    if (isFinished(examDate)) return "finished";
    if (isStarted(examDate)) return "orange";

    const t = getTimeRemaining(examDate).total;
    if (t < 600000) return "red";      // < 10 minutes
    if (t < 3600000) return "orange";  // < 1 hour
    if (t < 86400000) return "yellow"; // < 24 hours
    return "";
}

function sortExams(data) {
    return data.slice().sort((a, b) => {
        const Astart = isStarted(a.date);
        const Bstart = isStarted(b.date);
        const Afinish = isFinished(a.date);
        const Bfinish = isFinished(b.date);

        if (!Astart && !Afinish && !Bstart && !Bfinish)
            return new Date(a.date) - new Date(b.date);

        if (Astart && !Bstart) return -1;
        if (Bstart && !Astart) return 1;

        if (Afinish && !Bfinish) return 1;
        if (Bfinish && !Afinish) return -1;

        return 0;
    });
}

/* --------------------------
   RENDER FUNCTIONS
--------------------------- */
function renderNextExam(sorted) {
    const upcoming = sorted.filter(e => !isFinished(e.date));
    const container = document.getElementById("nextExamContent");

    if (upcoming.length === 0) {
        container.textContent = "All exams completed!";
        return;
    }

    const next = upcoming[0];
    container.innerHTML = `
        <strong>${next.name}</strong><br>
        <span>${formatCountdown(next.date)}</span>
    `;
}

function renderExams() {
    let filtered = examData;

    if (showFavouritesOnly) {
        filtered = filtered.filter(e => favourites.includes(e.name));
    }

    if (searchQuery.trim() !== "") {
        filtered = filtered.filter(e =>
            e.name.toLowerCase().includes(searchQuery.toLowerCase())
        );
    }

    const sorted = sortExams(filtered);
    renderNextExam(sortExams(examData));

    const list = document.getElementById("examList");
    list.innerHTML = "";

    sorted.forEach(exam => {
        const card = document.createElement("div");
        card.className = `exam-card ${urgencyClass(exam.date)}`;

        card.innerHTML = `
            <div>
                <strong>${exam.name}</strong><br>
                <span>${formatCountdown(exam.date)}</span>
            </div>

            <div class="fav" data-name="${exam.name}">
                ${favourites.includes(exam.name) ? "⭐" : "☆"}
            </div>
        `;

        list.appendChild(card);
    });

    document.querySelectorAll(".fav").forEach(star => {
        star.onclick = () => toggleFavourite(star.dataset.name);
    });
}

/* --------------------------
   FAVOURITES
--------------------------- */
function toggleFavourite(name) {
    if (favourites.includes(name)) {
        favourites = favourites.filter(x => x !== name);
    } else {
        favourites.push(name);
    }
    localStorage.setItem("favourites", JSON.stringify(favourites));
    renderExams();
}

/* --------------------------
   EVENTS & INTERVAL
--------------------------- */
document.getElementById("filterAll").onclick = () => {
    showFavouritesOnly = false;
    document.getElementById("filterAll").className = "active-filter";
    document.getElementById("filterFav").className = "inactive-filter";
    renderExams();
};

document.getElementById("filterFav").onclick = () => {
    showFavouritesOnly = true;
    document.getElementById("filterFav").className = "active-filter";
    document.getElementById("filterAll").className = "inactive-filter";
    renderExams();
};

document.getElementById("searchBar").oninput = e => {
    searchQuery = e.target.value;
    renderExams();
};

/* Live updating every second */
setInterval(renderExams, 1000);

/* Initial load */
renderExams();
</script>

</body>
</html>
